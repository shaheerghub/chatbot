<!DOCTYPE html>
<html lang="en">
<head>
    <title>Purchase Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #21253a;
            --border: rgba(255,255,255,0.07);
            --accent: #4f7cff;
            --accent-glow: rgba(79, 124, 255, 0.25);
            --accent-2: #a78bfa;
            --text: #e8eaf6;
            --text-muted: #6b7280;
            --user-bubble: #1e2d5e;
            --bot-bubble: #1a1d27;
            --success: #34d399;
            --radius: 16px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79,124,255,0.12), transparent),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(167,139,250,0.08), transparent);
        }

        .chat-container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 32px 80px rgba(0,0,0,0.6),
                0 0 80px rgba(79,124,255,0.06);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .chat-header {
            padding: 20px 24px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-icon {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 16px var(--accent-glow);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            margin-left: auto;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Messages ── */
        #chatbox {
            height: 440px;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chatbox::-webkit-scrollbar { width: 4px; }
        #chatbox::-webkit-scrollbar-track { background: transparent; }
        #chatbox::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

        .message-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 30px; height: 30px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .avatar.bot {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }

        .avatar.user {
            background: var(--user-bubble);
            border: 1px solid rgba(79,124,255,0.3);
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
        }

        .bubble {
            max-width: 72%;
            padding: 11px 15px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.6;
            font-weight: 400;
        }

        .bubble.bot {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text);
        }

        .bubble.user {
            background: var(--user-bubble);
            border: 1px solid rgba(79,124,255,0.2);
            border-bottom-right-radius: 4px;
            color: #c7d4ff;
        }

        .bubble code {
            font-family: 'DM Mono', monospace;
            font-size: 12.5px;
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 5px;
        }

        /* ── Typing indicator ── */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 15px;
        }

        .typing-indicator span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* ── Suggestions ── */
        .suggestions {
            padding: 0 24px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        /* ── Input bar ── */
        .input-bar {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: rgba(255,255,255,0.01);
        }

        #message {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            resize: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.5;
            max-height: 120px;
            overflow-y: auto;
        }

        #message::placeholder { color: var(--text-muted); }

        #message:focus {
            border-color: rgba(79,124,255,0.5);
            box-shadow: 0 0 0 3px rgba(79,124,255,0.1);
        }

        #send {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        #send:hover {
            background: #6690ff;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        #send:active { transform: translateY(0); }

        #send svg {
            width: 18px; height: 18px;
            fill: white;
        }

        /* ── Welcome message ── */
        .welcome {
            text-align: center;
            padding: 24px 0 8px;
            color: var(--text-muted);
        }

        .welcome .welcome-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .welcome h3 {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }

        .welcome p {
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <!-- Header -->
    <div class="chat-header">
        <div class="header-icon">🛒</div>
        <div class="header-text">
            <h1>Purchase Assistant</h1>
            <p>Powered by MySQL · Natural language queries</p>
        </div>
        <div class="status-dot"></div>
    </div>

    <!-- Messages -->
    <div id="chatbox">
        <div class="welcome">
            <div class="welcome-icon">💬</div>
            <h3>How can I help you today?</h3>
            <p>Ask me anything about your purchase data.</p>
        </div>
    </div>

    <!-- Suggestions -->
    <div class="suggestions">
        <button class="suggestion-chip" onclick="fillMessage(this)">Show recent orders</button>
        <button class="suggestion-chip" onclick="fillMessage(this)">Top selling items</button>
        <button class="suggestion-chip" onclick="fillMessage(this)">Monthly revenue</button>
        <button class="suggestion-chip" onclick="fillMessage(this)">Low stock alerts</button>
    </div>

    <!-- Input -->
    <div class="input-bar">
        <textarea id="message" rows="1" placeholder="Ask about your purchase data…"></textarea>
        <button id="send" title="Send message">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z"/>
            </svg>
        </button>
    </div>

</div>

<script>
    // Auto-resize textarea
    const msgInput = document.getElementById('message');
    msgInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    msgInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            document.getElementById('send').click();
        }
    });

    function fillMessage(btn) {
        msgInput.value = btn.textContent;
        msgInput.focus();
    }

    function appendMessage(role, text) {
        const chatbox = document.getElementById('chatbox');

        // Remove welcome block on first message
        const welcome = chatbox.querySelector('.welcome');
        if (welcome) welcome.remove();

        const row = document.createElement('div');
        row.className = `message-row ${role}`;

        const avatar = document.createElement('div');
        avatar.className = `avatar ${role}`;
        avatar.textContent = role === 'bot' ? '🤖' : 'ME';

        const bubble = document.createElement('div');
        bubble.className = `bubble ${role}`;
        bubble.innerHTML = text.replace(/`([^`]+)`/g, '<code>$1</code>');

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatbox.appendChild(row);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    function showTyping() {
        const chatbox = document.getElementById('chatbox');
        const row = document.createElement('div');
        row.className = 'message-row bot';
        row.id = 'typing-row';

        const avatar = document.createElement('div');
        avatar.className = 'avatar bot';
        avatar.textContent = '🤖';

        const bubble = document.createElement('div');
        bubble.className = 'bubble bot typing-indicator';
        bubble.innerHTML = '<span></span><span></span><span></span>';

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatbox.appendChild(row);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typing-row');
        if (el) el.remove();
    }

    document.getElementById('send').addEventListener('click', async function () {
        const input = document.getElementById('message');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';
        input.style.height = 'auto';
        showTyping();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            hideTyping();
            appendMessage('bot', data.response || 'No response received.');
        } catch (err) {
            hideTyping();
            appendMessage('bot', '⚠️ Connection error. Please try again.');
        }
    });
</script>

</body>
</html>
